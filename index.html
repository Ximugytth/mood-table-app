<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#287460" />
    <title>心情表格</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./assets/icon-192.png" />
    <link rel="stylesheet" href="./styles.css?v=6" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">心</div>
          <div>
            <h1>心情表格</h1>
            <p id="saveStatus">已在本机保存</p>
          </div>
        </div>
        <button id="installButton" class="quiet-button hidden" type="button">安装到手机</button>
      </header>

      <main>
        <section id="overviewView" class="overview-view" aria-label="概览">
          <section class="day-workspace" aria-label="记录日期">
            <div class="day-title">
              <span class="eyebrow">当前页面</span>
              <h2 id="selectedDateTitle">今天</h2>
              <span id="dayRecordSummary" class="day-summary">0 个时间点</span>
            </div>

            <div class="day-controls">
              <div class="segmented-control" aria-label="查看范围">
                <button id="dayViewButton" class="segment active" type="button">按天</button>
                <button id="allViewButton" class="segment" type="button">全部</button>
              </div>
              <div id="dateNavigator" class="date-navigator">
                <button id="previousDayButton" class="icon-button" type="button" title="前一天" aria-label="前一天">‹</button>
                <input id="selectedDateInput" type="date" aria-label="选择日期" />
                <button id="nextDayButton" class="icon-button" type="button" title="后一天" aria-label="后一天">›</button>
                <button id="todayButton" class="quiet-button" type="button">今天</button>
              </div>
            </div>

            <button id="openRecordButton" class="record-cta" type="button">
              <span>进入记录页</span>
              <strong>开始填写</strong>
            </button>
          </section>

          <section class="control-panel" aria-label="模板和数据控制">
            <div class="template-row">
              <label class="field-label" for="templateSelect">当前模板</label>
              <select id="templateSelect"></select>
              <button id="newTemplateButton" class="tool-button" type="button">新建模板</button>
              <button id="renameTemplateButton" class="tool-button" type="button">编辑模板</button>
              <button id="deleteTemplateButton" class="danger-button" type="button">删除</button>
            </div>

            <div class="action-grid">
              <button id="addColumnButton" class="tool-button" type="button">添加指标</button>
              <button id="exportButton" class="tool-button" type="button">导出当天 CSV</button>
              <label class="file-button" for="csvFileInput">导入 CSV</label>
              <input id="csvFileInput" class="sr-only" type="file" accept=".csv,text/csv" />
            </div>

            <div class="search-row">
              <label class="field-label" for="searchInput">筛选摘要</label>
              <input id="searchInput" type="search" placeholder="搜索时间或记录内容" autocomplete="off" />
              <button id="clearSearchButton" class="quiet-button" type="button">清空</button>
            </div>
          </section>

          <section class="stats-strip" aria-label="当前页面统计">
            <div class="stat-card stat-count">
              <span>时间点</span>
              <strong id="recordCount">0</strong>
            </div>
            <div class="stat-card stat-average">
              <span id="moodAverageLabel">平均心情</span>
              <strong id="moodAverage">-</strong>
            </div>
            <div class="stat-card stat-high">
              <span>最高</span>
              <strong id="moodMax">-</strong>
            </div>
            <div class="stat-card stat-low">
              <span>最低</span>
              <strong id="moodMin">-</strong>
            </div>
          </section>

          <section class="summary-panel" aria-label="记录摘要">
            <div class="section-heading">
              <div>
                <span class="eyebrow">记录摘要</span>
                <h3 id="summaryTitle">当天记录</h3>
              </div>
              <button id="summaryRecordButton" class="primary-button" type="button">＋ 新增时间点</button>
            </div>
            <div id="overviewList" class="overview-list"></div>
            <div id="overviewEmptyState" class="overview-empty hidden">
              <strong>这一天还没有记录</strong>
              <span>进入记录页，添加第一个时间点。</span>
            </div>
          </section>
        </section>

        <section id="recordView" class="record-view hidden" aria-label="全屏记录">
          <header class="record-header">
            <button id="recordBackButton" class="back-button" type="button" aria-label="返回概览">‹</button>
            <div class="record-heading">
              <span class="eyebrow">记录页面</span>
              <h2 id="recordDateTitle">今天</h2>
              <span id="recordPageSummary">0 个时间点</span>
            </div>
            <button id="recordAddButton" class="primary-button" type="button">＋ 时间点</button>
          </header>

          <div class="record-date-bar">
            <button id="recordPreviousDayButton" class="icon-button" type="button" aria-label="记录页前一天">‹</button>
            <input id="recordDateInput" type="date" aria-label="记录页选择日期" />
            <button id="recordNextDayButton" class="icon-button" type="button" aria-label="记录页后一天">›</button>
            <button id="recordTodayButton" class="quiet-button" type="button">今天</button>
          </div>

          <section class="entry-sheet" aria-label="纵向心情记录表">
            <div class="entry-scroll" id="entryScroll">
              <table id="entryTable" class="entry-table">
                <thead id="entryTableHead"></thead>
                <tbody id="entryTableBody"></tbody>
              </table>
            </div>
            <div id="recordEmptyState" class="record-empty hidden">
              <div class="empty-mark" aria-hidden="true">＋</div>
              <strong>这一天还没有时间点</strong>
              <button id="recordEmptyAddButton" class="primary-button" type="button">添加第一个时间点</button>
            </div>
          </section>
        </section>
      </main>
    </div>

    <dialog id="templateDialog" class="dialog">
      <form method="dialog" id="templateForm">
        <div class="dialog-heading">
          <span class="eyebrow">模板设置</span>
          <h2 id="templateDialogTitle">新建模板</h2>
        </div>
        <label class="stacked-field">
          <span>模板名称</span>
          <input id="templateNameInput" type="text" maxlength="40" required />
        </label>
        <label class="stacked-field">
          <span>指标名称，一行一个</span>
          <textarea id="templateColumnsInput" rows="9" required></textarea>
        </label>
        <div class="dialog-actions">
          <button class="quiet-button" id="cancelTemplateButton" type="button">取消</button>
          <button class="primary-button" id="saveTemplateButton" value="default" type="submit">保存模板</button>
        </div>
      </form>
    </dialog>

    <dialog id="importDialog" class="dialog">
      <form method="dialog" id="importForm">
        <div class="dialog-heading">
          <span class="eyebrow">数据导入</span>
          <h2>导入 CSV</h2>
        </div>
        <p id="importSummary" class="dialog-copy"></p>
        <fieldset class="radio-group">
          <legend>导入方式</legend>
          <label>
            <input type="radio" name="importMode" value="append" checked />
            追加到当前模板
          </label>
          <label>
            <input type="radio" name="importMode" value="replace" />
            覆盖当前模板
          </label>
        </fieldset>
        <p class="import-date-note">没有日期的数据会归到当前选中的日期。</p>
        <div class="dialog-actions">
          <button class="quiet-button" id="cancelImportButton" type="button">取消</button>
          <button class="primary-button" id="confirmImportButton" value="default" type="submit">开始导入</button>
        </div>
      </form>
    </dialog>

    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>
    <script src="./app.js?v=6" defer></script>
  </body>
</html>
